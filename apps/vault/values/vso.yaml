defaultVaultConnection:
  enabled: false
defaultAuthMethod:
  enabled: false

controller:
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  manager:
    clientCache:
      persistenceModel: none

hooks:
  upgradeCRDs:
    enabled: false
