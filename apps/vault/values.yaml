# Global settings applied across all Vault components (server, injector, etc).
# Enforces TLS between components and sets default resource limits.
global:
  enabled: true
  tlsDisable: false
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 256Mi
      cpu: 250m

# The Vault Injector intercepts pod creation across the cluster and injects a
# sidecar container into any pod having the appropriate annotations. The helm
# chart requires security contexts to be set manually.
injector:
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 100
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL

# The vault API server
server:
  # Resource limits inline with official Vault recommendations for a small
  # HA cluster.
  resources:
    requests:
      memory: 8Gi
      cpu: 2000m
    limits:
      memory: 16Gi
      cpu: 2000m

  # The helm chart requires security contexts to be set manually.
  statefulSet:
    securityContext:
      pod:
        runAsNonRoot: true
        runAsGroup: 1000
        runAsUser: 100
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      container:
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL

  # Custom readiness/liveness probes are required for high availability deployments
  # These values are pulled directly from suggestions in the official docs.
  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"
  livenessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true"
    initialDelaySeconds: 60

  # List of extra environment variables to set with the stateful set.
  extraEnvironmentVars:
    VAULT_CACERT: /vault/userconfig/tls-ca/ca.crt

  # TLS secrets mounted inside the server pods.
  # tls-server: Certificate for TLS connections to the Vault server.
  # tls-ca: The CA certificate used to sign the certificate in tls-server.
  extraVolumes:
    - type: secret
      name: tls-server
    - type: secret
      name: tls-ca

  # Data storage used by raft to coordinate high availability deployments
  dataStorage:
    enabled: true
    size: 10Gi
    mountPath: "/vault/data"
    storageClass: pitt-vcf-vks-storage-policy-latebinding
    accessMode: ReadWriteOnce

  # Data storage for application audit logging.
  auditStorage:
    enabled: true
    size: 10Gi
    mountPath: "/vault/audit"
    storageClass: pitt-vcf-vks-storage-policy-latebinding
    accessMode: ReadWriteOnce

  # Run Vault in high availability mode with a five-node raft deployment.
  # Each node explicitly joins via `retry_join` rather than relying on
  # DNS-based discovery, which avoids split-brain during rolling restarts.
  standalone:
    enabled: false
  ha:
    enabled: true
    replicas: 5
    raft:
      enabled: true
      setNodeId: true

      config: |
        ui = true
        cluster_name = "vault-integrated-storage"
        listener "tcp" {
          address = "0.0.0.0:8200"
          cluster_address = "0.0.0.0:8201"
          tls_cert_file = "/vault/userconfig/tls-server/tls.crt"
          tls_key_file = "/vault/userconfig/tls-server/tls.key"
        }

        storage "raft" {
          path = "/vault/data"
          retry_join {
            leader_api_addr = "https://vault-0.vault-internal:8200"
            leader_ca_cert_file = "/vault/userconfig/tls-ca/ca.crt"
            leader_client_cert_file = "/vault/userconfig/tls-server/tls.crt"
            leader_client_key_file = "/vault/userconfig/tls-server/tls.key"
          }
          retry_join {
            leader_api_addr = "https://vault-1.vault-internal.admin-vault.svc.cluster.local:8200"
            leader_ca_cert_file = "/vault/userconfig/tls-ca/ca.crt"
            leader_client_cert_file = "/vault/userconfig/tls-server/tls.crt"
            leader_client_key_file = "/vault/userconfig/tls-server/tls.key"
          }
          retry_join {
            leader_api_addr = "https://vault-2.vault-internal.admin-vault.svc.cluster.local:8200"
            leader_ca_cert_file = "/vault/userconfig/tls-ca/ca.crt"
            leader_client_cert_file = "/vault/userconfig/tls-server/tls.crt"
            leader_client_key_file = "/vault/userconfig/tls-server/tls.key"
          }
          retry_join {
            leader_api_addr = "https://vault-3.vault-internal.admin-vault.svc.cluster.local:8200"
            leader_ca_cert_file = "/vault/userconfig/tls-ca/ca.crt"
            leader_client_cert_file = "/vault/userconfig/tls-server/tls.crt"
            leader_client_key_file = "/vault/userconfig/tls-server/tls.key"
          }
          retry_join {
            leader_api_addr = "https://vault-4.vault-internal.admin-vault.svc.cluster.local:8200"
            leader_ca_cert_file = "/vault/userconfig/tls-ca/ca.crt"
            leader_client_cert_file = "/vault/userconfig/tls-server/tls.crt"
            leader_client_key_file = "/vault/userconfig/tls-server/tls.key"
          }
        }

  certificate:
    enabled: true
    secretName: vault-tls
    issuer:
      name: sectigo-issuer
      kind: ClusterIssuer
    domain: vault.crcd.pitt.edu

# Vault web interface
ui:
  enabled: true
  serviceType: "LoadBalancer"
  loadBalancerIP: 10.7.84.18
  serviceNodePort: null
  externalPort: 8200
