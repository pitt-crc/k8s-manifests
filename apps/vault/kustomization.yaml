apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: admin-vault
helmCharts:
  - name: vault
    version: 0.32.0
    releaseName: vault
    repo: https://helm.releases.hashicorp.com
    valuesFile: values/vault.yaml
    includeCRDs: true

  - name: vault-secrets-operator
    version: 1.4.0
    releaseName: vault-secrets-operator
    repo: https://helm.releases.hashicorp.com
    valuesFile: values/vso.yaml
    includeCRDs: true

resources:
  - certificates.yaml
  - token-reviewer.yaml
