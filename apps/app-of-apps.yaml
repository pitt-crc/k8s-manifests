apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/pitt-crc/k8s-manifests.git
    targetRevision: argo
    path: argocd/install
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true      # Reverts manual kubectl edits — important!
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
