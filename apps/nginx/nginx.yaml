apiVersion: v1
kind: Namespace
metadata:
  name: admin-nginx
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-nginx-sa
  namespace: admin-nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: admin-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "nginx-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/admin/nginx/test"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/admin/nginx/test" -}}
          export TEST_VALUE="{{ .Data.data.value }}"
          {{- end }}
    spec:
      serviceAccountName: admin-nginx-sa
      containers:
        - name: nginx
          image: nginx:latest
          command:
            - /bin/sh
            - -c
            - |
              source /vault/secrets/config && nginx -g 'daemon off;'
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: admin-nginx
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml