---
apiVersion: v1
kind: Namespace
metadata:
  name: admin-nginx
  labels:
    kubernetes.io/metadata.name: nginx
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-nginx-acc
  namespace: admin-nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: admin-nginx
  labels:
    app: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "nginx"
        # Render the KV v2 secret as a clean HTML file into the shared web root.
        vault.hashicorp.com/agent-inject-secret-index.html: "secret/data/nginx/config"
        vault.hashicorp.com/agent-inject-template-index.html: |
          {{- with secret "secret/data/nginx/config" -}}
          <!DOCTYPE html>
          <html><body><pre>
          {{ range $k, $v := .Data.data }}{{ $k }}: {{ $v }}
          {{ end }}</pre></body></html>
          {{- end -}}
        # Write the rendered files into the nginx web root rather than /vault/secrets.
        vault.hashicorp.com/secret-volume-path: "/usr/share/nginx/html"
    spec:
      serviceAccountName: admin-nginx-acc
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: nginx
                topologyKey: kubernetes.io/hostname
      containers:
        - name: nginx
          image: nginx:1.29.6-alpine
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 4Gi
          ports:
            - containerPort: 80
      # No content emptyDir or init container needed — Vault writes index.html directly.
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: admin-nginx
  labels:
    app: nginx
spec:
  type: LoadBalancer
  loadBalancerIP: 10.7.84.15
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
