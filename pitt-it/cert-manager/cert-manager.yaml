---
apiVersion: v1
kind: Secret
metadata:
  name: sectigo-eab-credentials
  namespace: cert-manager
type: Opaque
stringData:
  hmac-key: "<eab-hmac-key>"
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: sectigo-issuer
spec:
  acme:
    server: "https://acme.enterprise.sectigo.com"
    email: "<acme-email>"
    privateKeySecretRef:
      name: sectigo-issuer-account-key
    externalAccountBinding:
      keyID: "<eab-key-id>"
      keySecretRef:
        name: sectigo-eab-credentials
        key: hmac-key
    solvers:
      - http01:
          ingress:
            ingressClassName: contour
