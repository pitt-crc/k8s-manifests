apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-ldap-cm
  namespace: argocd
data:
  # LDAP / Dex connector
  dex.config: |
    connectors:
      - type: ldap
        id: ldap
        name: LDAP
        config:
          host: ldap.example.com:636
          insecureNoSSL: false
          bindDN: cn=serviceaccount,dc=example,dc=com
          bindPW: $dex.ldap.bindPW          # refs argocd-secret key
          usernamePrompt: Username
          userSearch:
            baseDN: ou=users,dc=example,dc=com
            filter: "(objectClass=person)"
            username: uid
            idAttr: uid
            emailAttr: mail
            nameAttr: cn
          groupSearch:
            baseDN: ou=groups,dc=example,dc=com
            filter: "(objectClass=groupOfNames)"
            userMatchers:
              - userAttr: DN
                groupAttr: member
            nameAttr: cn
  # UI URL (needed for SSO callbacks)
  url: https://argocd.example.com
