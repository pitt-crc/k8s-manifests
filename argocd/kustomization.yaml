apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/ha/install.yaml

patches:
  - path: overlays/argocd-cm.yaml
    target:
      kind: ConfigMap
      name: argocd-cm
  - path: overlays/argocd-rbac-cm.yaml
    target:
      kind: ConfigMap
      name: argocd-rbac-cm
