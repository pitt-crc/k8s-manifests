apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: crcd
  namespace: argocd
spec:
  description: CRCD application deployments.
  sourceRepos:
    - '*'
  destinations:
    - server: https://kubernetes.default.svc
      namespace: crcd-*
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  roles:
    - name: tenant
      policies:
        - p, proj:crcd:tenant, applications, get, crcd/*, allow
        - p, proj:crcd:tenant, applications, sync, crcd/*, allow
        - p, proj:crcd:tenant, applications, action/*, crcd/*, allow
        - p, proj:crcd:tenant, logs, get, crcd/*, allow
      groups:
        - sam_frank_admins_posix
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crcd-monitoring
  namespace: argocd
spec:
  project: crcd
  source:
    repoURL: https://github.com/pitt-crc/Ops-Monitoring.git
    targetRevision: main
    path: "manifests"
  destination:
    server: https://kubernetes.default.svc
    namespace: crcd-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true